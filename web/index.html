<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Wreadom">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Wreadom</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    const loadFlutterBootstrap = () => {
      const script = document.createElement('script');
      script.src = 'flutter_bootstrap.js';
      script.async = true;
      document.body.appendChild(script);
    };

    if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
      delete self.FIREBASE_APPCHECK_DEBUG_TOKEN;

      const serviceWorkerCleanup = 'serviceWorker' in navigator
        ? navigator.serviceWorker.getRegistrations().then((registrations) => {
          registrations.forEach((registration) => registration.unregister());
        })
        : Promise.resolve();

      const cacheCleanup = 'caches' in self
        ? caches.keys().then((keys) => {
          keys
            .filter((key) => key.includes('flutter') || key.includes('wreadom'))
            .forEach((key) => caches.delete(key));
        })
        : Promise.resolve();

      // App Check is disabled by default in local web development.
      // If you wish to use App Check Debug Provider, register your token in the Firebase console
      // and uncomment the line below (setting it to true or your custom debug token string):
      // self.FIREBASE_APPCHECK_DEBUG_TOKEN = true;

      Promise.all([serviceWorkerCleanup, cacheCleanup])
        .catch(() => {})
        .finally(loadFlutterBootstrap);
    } else {
      loadFlutterBootstrap();
    }
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
</body>
</html>
